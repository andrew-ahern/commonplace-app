<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commonplace Book</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1917">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Commonplace">
</head>
<body>

<div id="app">

  <div id="main">

    <!-- New Entry screen -->
    <section id="screen-new-entry" class="screen active">
      <div class="screen-header"><h1>New Entry</h1></div>

      <div id="type-buttons">
        <button class="type-btn active" data-type="note">Note<span class="draft-dot"></span></button>
        <button class="type-btn" data-type="word">Word<span class="draft-dot"></span></button>
        <button class="type-btn" data-type="quote">Quote<span class="draft-dot"></span></button>
        <button class="type-btn" data-type="marginalium">Marginalium<span class="draft-dot"></span></button>
      </div>

      <!-- Note form -->
      <form id="form-note" class="entry-form active">
        <div class="card form-card">
          <div class="field">
            <label for="note-heading">Heading</label>
            <input type="text" id="note-heading" name="heading">
          </div>
          <div class="field">
            <label for="note-note">Note</label>
            <textarea id="note-note" name="note" rows="6"></textarea>
          </div>
          <div class="field">
            <label for="note-tags">Tags</label>
            <div class="tag-input-wrapper">
              <input type="text" id="note-tags" name="tags" autocomplete="off">
              <div class="tag-suggestions" id="note-tag-suggestions"></div>
            </div>
          </div>
        </div>
        <button type="button" class="save-btn" data-type="note">Save</button>
        <p class="draft-indicator" id="draft-note"></p>
      </form>

      <!-- Word form -->
      <form id="form-word" class="entry-form">
        <div class="card form-card">
          <div class="field">
            <label for="word-word">Word</label>
            <input type="text" id="word-word" name="word">
          </div>
          <div class="field">
            <label for="word-comment">Comment</label>
            <textarea id="word-comment" name="comment" rows="4"></textarea>
          </div>
        </div>
        <button type="button" class="save-btn" data-type="word">Save</button>
        <p class="draft-indicator" id="draft-word"></p>
      </form>

      <!-- Quote form -->
      <form id="form-quote" class="entry-form">
        <div class="card form-card">
          <div class="field">
            <label for="quote-quote">Quote</label>
            <textarea id="quote-quote" name="quote" rows="6"></textarea>
          </div>
          <div class="field ref-page-row">
            <div class="ref-field">
              <!-- Reference selector — built dynamically by ui.newentry.js -->
              <div class="ref-selector" id="quote-ref-selector"></div>
            </div>
            <div class="page-field">
              <label for="quote-page">Page</label>
              <input type="text" id="quote-page" name="page">
            </div>
          </div>
          <div class="field">
            <label for="quote-comment">Comment</label>
            <textarea id="quote-comment" name="comment" rows="4"></textarea>
          </div>
          <div class="field">
            <label for="quote-tags">Tags</label>
            <div class="tag-input-wrapper">
              <input type="text" id="quote-tags" name="tags" autocomplete="off">
              <div class="tag-suggestions" id="quote-tag-suggestions"></div>
            </div>
          </div>
        </div>
        <button type="button" class="save-btn" data-type="quote">Save</button>
        <p class="draft-indicator" id="draft-quote"></p>
      </form>

      <!-- Marginalium form -->
      <form id="form-marginalium" class="entry-form">
        <div class="card form-card">
          <div class="field">
            <label for="marginalium-heading">Heading</label>
            <input type="text" id="marginalium-heading" name="heading">
          </div>
          <div class="field">
            <label for="marginalium-marginalium">Marginalium</label>
            <textarea id="marginalium-marginalium" name="marginalium" rows="6"></textarea>
          </div>
          <div class="field ref-page-row">
            <div class="ref-field">
              <div class="ref-selector" id="marginalium-ref-selector"></div>
            </div>
            <div class="page-field">
              <label for="marginalium-page">Page</label>
              <input type="text" id="marginalium-page" name="page">
            </div>
          </div>
          <div class="field">
            <label for="marginalium-tags">Tags</label>
            <div class="tag-input-wrapper">
              <input type="text" id="marginalium-tags" name="tags" autocomplete="off">
              <div class="tag-suggestions" id="marginalium-tag-suggestions"></div>
            </div>
          </div>
        </div>
        <button type="button" class="save-btn" data-type="marginalium">Save</button>
        <p class="draft-indicator" id="draft-marginalium"></p>
      </form>

    </section>

    <!-- Library screen -->
    <section id="screen-browse" class="screen">
      <div class="screen-header"><h1>Library</h1></div>
      <div id="entry-list"></div>
    </section>

    <!-- Settings screen -->
    <section id="screen-settings" class="screen">
      <p>Settings coming soon.</p>
    </section>

  </div><!-- /#main -->

  <!-- Bottom navigation -->
  <nav id="nav">
    <button class="nav-btn active" data-screen="new-entry">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      New Entry
    </button>
    <button class="nav-btn" data-screen="browse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      Library
    </button>
    <button class="nav-btn" data-screen="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
  </nav>

</div><!-- /#app -->

<!-- Entry detail bottom sheet -->
<div id="sheet-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:300;"></div>
<div id="entry-sheet" style="display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-radius:16px 16px 0 0; z-index:301; max-height:90dvh; overflow-y:auto; padding:1rem 1rem calc(1rem + var(--safe-bottom));">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
    <h2 id="sheet-title" style="font-size:17px; font-weight:600; margin:0;"></h2>
    <button id="sheet-close" type="button" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--muted); padding:0; line-height:1;">×</button>
  </div>
  <div id="sheet-body"></div>
  <div id="sheet-footer" style="margin-top:1rem; display:none;">
    <button type="button" class="btn btn-danger" id="sheet-delete-btn" style="width:100%;">Delete</button>
  </div>
</div>

<!-- Settings modal -->
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:300;"></div>
<div id="settings-modal" style="display:none; position:fixed; top:var(--modal-top); left:50%; transform:translateX(-50%); width:var(--modal-width); max-width:var(--modal-max-width); height:var(--modal-height); background:var(--surface); border-radius:16px; z-index:301; overflow-y:auto; padding:var(--modal-padding);">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
    <h2 id="modal-title" style="font-size:17px; font-weight:600; margin:0;"></h2>
    <button id="modal-close" type="button" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--muted); padding:0; line-height:1;">×</button>
  </div>
  <div id="modal-body"></div>
</div>

<!-- Ref detail sheet -->
<div id="ref-sheet-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:399;"></div>
<div id="ref-sheet" style="display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-radius:16px 16px 0 0; z-index:400; max-height:70dvh; overflow-y:auto; padding:1rem 1rem calc(1rem + var(--safe-bottom));">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
    <h2 id="ref-sheet-title" style="font-size:17px; font-weight:600; margin:0;"></h2>
    <button id="ref-sheet-close" type="button" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--muted); padding:0; line-height:1;">×</button>
  </div>
  <div id="ref-sheet-body"></div>
  <div id="ref-sheet-footer" style="margin-top:1rem; display:none;">
    <button type="button" class="btn btn-danger" id="ref-sheet-delete-btn" style="width:100%;">Delete</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Scripts -->
<script src="js/schemas.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/tags.js"></script>
<script src="js/entries.js"></script>
<script src="js/refs.js"></script>
<script src="js/sync.js"></script>
<script src="js/ui.refform.js"></script>
<script src="js/ui.newentry.js"></script>
<script src="js/ui.browse.js"></script>
<script src="js/ui.settings.js"></script>
<script src="js/app.js"></script>

<!-- Service worker registration — kept separate so it always runs
     even if app scripts have errors. Bump CACHE_NAME in sw.js to trigger
     an automatic update on next online load. -->
<script>
  if ('serviceWorker' in navigator) {

    // Log current SW version to console
    navigator.serviceWorker.ready.then(reg => {
      if (reg.active) {
        const chan = new MessageChannel();
        chan.port1.onmessage = e => console.log('Commonplace Book —', e.data);
        reg.active.postMessage({ type: 'GET_VERSION' }, [chan.port2]);
      }
    });

    // Register SW — skip waiting immediately when update found, then reload
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed') {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }).catch(err => console.error('Service worker registration failed:', err));

    // On every online load: fetch sw.js fresh, compare CACHE_NAME to stored
    // version, clear caches and hard reload if changed
    if (navigator.onLine) {
      fetch('./sw.js', { cache: 'no-store' })
        .then(r => r.text())
        .then(text => {
          const match = text.match(/const CACHE_NAME = '(.+?)'/);
          if (!match) return;
          const latest = match[1];
          const stored = localStorage.getItem('sw_version');
          if (stored && stored !== latest) {
            localStorage.setItem('sw_version', latest);
            caches.keys()
              .then(keys => Promise.all(keys.map(k => caches.delete(k))))
              .then(() => window.location.reload(true));
          } else {
            localStorage.setItem('sw_version', latest);
          }
        }).catch(() => {});
    }
  }
</script>

</body>
</html>
